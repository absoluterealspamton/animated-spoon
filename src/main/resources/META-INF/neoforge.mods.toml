modLoader = "javafml"
loaderVersion = "${loader_version_range}"
license = "${mod_license}"

issueTrackerURL="https://example.com/issues"

mods {
    mod {
        modId = "${mod_id}"
        version = "${mod_version}"
        displayName = "${mod_name}"
        description = '''Urceus Command Generator - A powerful command generator GUI for Minecraft.'''
        credits = "Created by Urceus"
        authors = "Urceus"
        links {
            homepage = "https://example.com"
            issue = "https://example.com/issues"
            discord = "https://discord.gg/example"
        }
    }
}

[[dependencies.ucg]]
    modId = "neoforge"
    type = "required"
    versionRange = "[${neo_version},)"
    ordering = "NONE"
    side = "BOTH"

[[dependencies.ucg]]
    modId = "minecraft"
    type = "required"
    versionRange = "${minecraft_version_range}"
    ordering = "NONE"
    side = "BOTH"

accessTransformers = []

fml.wrappermarkdown = """
# Urceus Command Generator

A powerful command generator GUI for Minecraft.

"""